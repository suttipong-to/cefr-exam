<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>หน้าผู้ดูแลระบบ · CEFR A2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css?v=6">
</head>
<body data-page="admin">
  <div class="wrap wrap-wide">
    <header class="masthead">
      <div class="brand">ผู้ดูแลระบบ · <span>CEFR A2</span></div>
      <div class="sub">Admin · Results</div>
    </header>

    <!-- ประตูใส่รหัส -->
    <div class="panel" id="gate" style="max-width:460px">
      <h1>เข้าสู่ระบบผู้ดูแล</h1>
      <p class="lead">กรอกรหัสผ่านเพื่อดูผลการสอบ</p>
      <div id="login-error" class="error-msg" hidden></div>
      <div class="field">
        <label for="pass-input">รหัสผ่านแอดมิน</label>
        <input type="password" id="pass-input" autocomplete="current-password">
      </div>
      <button class="btn btn-block" id="login-btn">เข้าสู่ระบบ</button>
    </div>

    <!-- แดชบอร์ด -->
    <div id="dashboard" hidden>
      <div class="stats">
        <div class="stat"><div class="k">จำนวนผู้สอบ</div><div class="v" id="stat-count">0</div></div>
        <div class="stat"><div class="k">คะแนนเฉลี่ย</div><div class="v" id="stat-avg">–</div></div>
        <div class="stat"><div class="k">ผ่านเกณฑ์</div><div class="v" id="stat-pass">–</div></div>
      </div>

      <div class="toolbar">
        <input type="text" id="filter-text" class="grow" placeholder="ค้นหาชื่อ–นามสกุล">
        <select id="filter-set"></select>
        <span class="spacer"></span>
        <button class="btn btn-ghost" id="view-keys-btn">📋 ดูเฉลยข้อสอบ</button>
        <button class="btn btn-ghost" id="export-btn">ดาวน์โหลด CSV</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>เวลา</th><th>ชื่อ–นามสกุล</th><th>ชุด</th>
              <th class="num">คะแนน</th><th class="num">%</th><th>ผล</th>
              <th style="text-align:center">ตรวจคำตอบ</th>
            </tr>
          </thead>
          <tbody id="results-body"></tbody>
        </table>
        <div class="empty" id="empty" hidden>ยังไม่มีผลการสอบ</div>
      </div>
    </div>

    <!-- Modal ดูตารางเฉลยข้อสอบ (Answer Keys) -->
    <div id="keys-modal" class="modal-overlay" hidden>
      <div class="modal-content">
        <div class="modal-head">
          <h3>📋 ตารางเฉลยข้อสอบ (Answer Keys)</h3>
          <button class="btn btn-ghost btn-sm close-modal-btn" data-target="keys-modal">✕</button>
        </div>
        <div class="modal-body">
          <div class="key-tabs" id="key-tabs">
            <button class="key-tab active" data-set="Set 1">ชุดที่ 1</button>
            <button class="key-tab" data-set="Set 2">ชุดที่ 2</button>
            <button class="key-tab" data-set="Set 3">ชุดที่ 3</button>
          </div>
          <div id="keys-content"></div>
        </div>
        <div class="modal-foot">
          <button class="btn close-modal-btn" data-target="keys-modal">ปิดหน้าต่าง</button>
        </div>
      </div>
    </div>

    <!-- Modal ดูผลตรวจคำตอบรายคน (Student Inspect) -->
    <div id="inspect-modal" class="modal-overlay" hidden>
      <div class="modal-content">
        <div class="modal-head">
          <h3 id="inspect-title">🔍 ตรวจคำตอบรายข้อ</h3>
          <button class="btn btn-ghost btn-sm close-modal-btn" data-target="inspect-modal">✕</button>
        </div>
        <div class="modal-body">
          <div id="inspect-summary" class="inspect-summary"></div>
          <div id="inspect-content"></div>
        </div>
        <div class="modal-foot">
          <button class="btn close-modal-btn" data-target="inspect-modal">ปิดหน้าต่าง</button>
        </div>
      </div>
    </div>

    <p class="foot">ระบบสอบออนไลน์ · CEFR A1 → A2</p>
  </div>

  <script src="config.js?v=6"></script>
  <script src="assets/js/api.js?v=6"></script>
  <script src="assets/js/admin.js?v=6"></script>
</body>
</html>
